version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 15
    versioning-strategy: 'increase'
    cooldown:
      default-days: 7
    labels:
      - 'dependencies'
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - 'version-update:semver-major'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'dependencies'

<html>
  <head>
    <!-- Load ioBroker scripts and styles-->
    <link rel="stylesheet" type="text/css" href="../../css/adapter.css" />
    <link rel="stylesheet" type="text/css" href="../../lib/css/materialize.css" />

    <script type="text/javascript" src="../../lib/js/jquery-3.2.1.min.js"></script>
    <script type="text/javascript" src="../../socket.io/socket.io.js"></script>

    <script type="text/javascript" src="../../js/translate.js"></script>
    <script type="text/javascript" src="../../lib/js/materialize.js"></script>
    <script type="text/javascript" src="../../js/adapter-settings.js"></script>

    <!-- Load our own files -->
    <link rel="stylesheet" type="text/css" href="style.css" />
    <script type="text/javascript" src="words.js"></script>
    <script type="text/javascript" src="index_m.js"></script>
  </head>

  <body>
    <div class="m adapter-container">
      <div class="row">
        <div class="col s12 m4 l2">
          <img src="volvo.png" class="logo" />
        </div>
      </div>

      <!-- Settings -->
      <div class="row">
        <div class="col s6 input-field">
          <input type="text" class="value" id="user" />
          <label for="user" class="translate">Volvo ID Email</label>
        </div>
      </div>
      <div class="row">
        <div class="col s6 input-field">
          <input type="password" class="value" id="password" />
          <label for="password" class="translate">Volvo ID Password</label>
        </div>
      </div>
      <div class="row">
        <div class="col s6 input-field">
          <input type="text" class="value" id="vccapikey" />
          <label for="vccapikey" class="translate">VCC API Key (from developer.volvocars.com)</label>
        </div>
      </div>
      <div class="row">
        <div class="col s6 input-field">
          <input type="number" class="value" id="interval" />
          <label for="interval" class="translate">Update interval in minutes</label>
        </div>
      </div>

      <!-- OTP Login Section -->
      <div class="row">
        <div class="col s12">
          <h5 class="translate">Login with OTP</h5>
          <p class="translate">otp_description</p>
        </div>
      </div>
      <div class="row">
        <div class="col s6">
          <a id="btn-start-login" class="btn waves-effect waves-light translate">Start Login (Send OTP)</a>
        </div>
      </div>
      <div class="row" id="otp-section" style="display:none;">
        <div class="col s4 input-field">
          <input type="text" id="otp-code" />
          <label for="otp-code" class="translate">OTP Code from Email</label>
        </div>
        <div class="col s2" style="margin-top: 20px;">
          <a id="btn-submit-otp" class="btn waves-effect waves-light green translate">Submit OTP</a>
        </div>
      </div>
      <div class="row">
        <div class="col s12">
          <span id="otp-status"></span>
        </div>
      </div>
    </div>
  </body>
</html>

<html>
  <head>
    <!-- Load ioBroker scripts and styles-->
    <link rel="stylesheet" type="text/css" href="../../css/adapter.css" />
    <link rel="stylesheet" type="text/css" href="../../lib/css/materialize.css" />

    <script type="text/javascript" src="../../lib/js/jquery-3.2.1.min.js"></script>
    <script type="text/javascript" src="../../socket.io/socket.io.js"></script>

    <script type="text/javascript" src="../../js/translate.js"></script>
    <script type="text/javascript" src="../../lib/js/materialize.js"></script>
    <script type="text/javascript" src="../../js/adapter-settings.js"></script>

    <!-- Load our own files -->
    <link rel="stylesheet" type="text/css" href="style.css" />
    <script type="text/javascript" src="words.js"></script>

    <script type="text/javascript">
      var secret;
      var namespace;

      function encrypt(key, value) {
        var result = "";
        for (var i = 0; i < value.length; ++i) {
          result += String.fromCharCode(key[i % key.length].charCodeAt(0) ^ value.charCodeAt(i));
        }
        return result;
      }

      function decrypt(key, value) {
        var result = "";
        for (var i = 0; i < value.length; ++i) {
          result += String.fromCharCode(key[i % key.length].charCodeAt(0) ^ value.charCodeAt(i));
        }
        return result;
      }

      function _(text) {
        if (systemDictionary && systemDictionary[text]) {
          var lang = systemLang || "en";
          return systemDictionary[text][lang] || systemDictionary[text]["en"] || text;
        }
        return text;
      }

      // the function loadSettings has to exist ...
      function loadHelper(settings, onChange) {
        // example: select elements with id=key and class=value and insert value
        if (!settings) return;

        $(".value").each(function () {
          var $key = $(this);
          var id = $key.attr("id");
          if (id === "password") {
            settings[id] = decrypt(secret, settings[id]);
          }

          if ($key.attr("type") === "checkbox") {
            // do not call onChange direct, because onChange could expect some arguments
            $key.prop("checked", settings[id]).change(function () {
              onChange();
            });
          } else {
            // do not call onChange direct, because onChange could expect some arguments
            $key
              .val(settings[id])
              .change(function () {
                onChange();
              })
              .keyup(function () {
                onChange();
              });
          }
        });
        onChange(false);
        M.updateTextFields();
      }

      // This will be called by the admin adapter when the settings page loads
      function load(settings, onChange) {
        socket.emit("getObject", "system.config", function (err, obj) {
          secret = (obj.native ? obj.native.secret : "") || "Zgfr56gFe87jJOM";
          loadHelper(settings, onChange);
        });

        // OTP Login flow
        $("#btn-start-login").click(function () {
          var user = $("#user").val();
          var password = $("#password").val();

          if (!user || !password) {
            $("#otp-status").text(_("Please enter username and password first.")).css("color", "red");
            return;
          }

          $("#otp-status").text(_("Starting login... Sending OTP to your email...")).css("color", "orange");
          $("#btn-start-login").prop("disabled", true);

          // Determine the adapter instance namespace
          var parts = window.location.hash.replace("#", "").split("/");
          namespace = parts[0] || "volvo.0";

          sendTo(namespace, "startLogin", { user: user, password: decrypt(secret, encrypt(secret, password)) }, function (result) {
            $("#btn-start-login").prop("disabled", false);
            if (result && result.success) {
              $("#otp-status").text(result.message).css("color", "green");
              $("#otp-section").show();
            } else {
              $("#otp-status").text(_("Login failed: ") + (result ? result.message : "Unknown error")).css("color", "red");
            }
          });
        });

        $("#btn-submit-otp").click(function () {
          var otp = $("#otp-code").val();
          if (!otp) {
            $("#otp-status").text(_("Please enter the OTP code.")).css("color", "red");
            return;
          }

          $("#otp-status").text(_("Verifying OTP...")).css("color", "orange");
          $("#btn-submit-otp").prop("disabled", true);

          sendTo(namespace, "submitOtp", { otp: otp }, function (result) {
            $("#btn-submit-otp").prop("disabled", false);
            if (result && result.success) {
              $("#otp-status").text(result.message).css("color", "green");
              $("#otp-section").hide();
              $("#otp-code").val("");
            } else {
              $("#otp-status").text(_("OTP failed: ") + (result ? result.message : "Unknown error")).css("color", "red");
            }
          });
        });
      }

      // This will be called by the admin adapter when the user presses the save button
      function save(callback) {
        // example: select elements with class=value and build settings object
        var obj = {};
        $(".value").each(function () {
          var $this = $(this);
          var id = $this.attr("id");

          if ($this.attr("type") === "checkbox") {
            obj[id] = $this.prop("checked");
          } else {
            var value = $this.val();
            if (id === "password") {
              value = encrypt(secret, value);
            }
            obj[id] = value;
          }
        });

        callback(obj);
      }
    </script>
  </head>

  <body>
    <div class="m adapter-container">
      <div class="row">
        <div class="col s12 m4 l2">
          <img src="volvo.png" class="logo" />
        </div>
      </div>

      <!-- Settings -->
      <div class="row">
        <div class="col s6 input-field">
          <input type="text" class="value" id="user" />
          <label for="user" class="translate">Volvo ID Email</label>
        </div>
      </div>
      <div class="row">
        <div class="col s6 input-field">
          <input type="password" class="value" id="password" />
          <label for="password" class="translate">Volvo ID Password</label>
        </div>
      </div>
      <div class="row">
        <div class="col s6 input-field">
          <input type="text" class="value" id="vccapikey" />
          <label for="vccapikey" class="translate">VCC API Key (from developer.volvocars.com)</label>
        </div>
      </div>
      <div class="row">
        <div class="col s6 input-field">
          <input type="number" class="value" id="interval" />
          <label for="interval" class="translate">Update interval in minutes</label>
        </div>
      </div>

      <!-- OTP Login Section -->
      <div class="row">
        <div class="col s12">
          <h5 class="translate">Login with OTP</h5>
          <p class="translate">otp_description</p>
        </div>
      </div>
      <div class="row">
        <div class="col s6">
          <a id="btn-start-login" class="btn waves-effect waves-light translate">Start Login (Send OTP)</a>
        </div>
      </div>
      <div class="row" id="otp-section" style="display:none;">
        <div class="col s4 input-field">
          <input type="text" id="otp-code" />
          <label for="otp-code" class="translate">OTP Code from Email</label>
        </div>
        <div class="col s2" style="margin-top: 20px;">
          <a id="btn-submit-otp" class="btn waves-effect waves-light green translate">Submit OTP</a>
        </div>
      </div>
      <div class="row">
        <div class="col s12">
          <span id="otp-status"></span>
        </div>
      </div>
    </div>
  </body>
</html>
